<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0c0e18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Faces — People Memory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
<base target="_blank">
</head>
<body>

<!-- subtle grain texture overlay -->
<div class="texture-overlay"></div>

<!-- ═══ AUTH SCREEN ═══ -->
<div id="auth-screen">
  <div class="auth-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>
  <div class="auth-card">
    <div class="auth-icon">𝓕</div>
    <div class="auth-title">Faces</div>
    <div class="auth-sub">Don't Worry. You can do it.<br>Enter the passphrase to continue.</div>
    <input class="auth-input" type="password" id="auth-pw-input" placeholder="••••••••" autocomplete="current-password" enterkeyhint="go">
    <button class="auth-btn" id="auth-btn">Unlock →</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">

  <!-- animated warping wave layers -->
  <div class="app-wave-bg">
    <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
      <path fill="rgba(196,181,253,0.15)" d="M0,192L48,197.3C96,203,192,213,288,229.3C384,245,480,267,576,250.7C672,235,768,181,864,181.3C960,181,1056,235,1152,234.7C1248,235,1344,181,1392,154.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
    </svg>
    <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
      <path fill="rgba(236,72,153,0.12)" d="M0,64L48,80C96,96,192,128,288,128C384,128,480,96,576,106.7C672,117,768,171,864,186.7C960,203,1056,181,1152,165.3C1248,149,1344,139,1392,133.3L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
    </svg>
    <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
      <path fill="rgba(6,182,212,0.1)" d="M0,256L48,245.3C96,235,192,213,288,192C384,171,480,149,576,165.3C672,181,768,235,864,250.7C960,267,1056,245,1152,224C1248,203,1344,181,1392,170.7L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
    </svg>
  </div>

  <!-- Top bar -->
  <div class="top-bar">
    <span class="top-bar-title">Faces</span>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="search" id="search-input" placeholder="Search names…" enterkeyhint="search">
    </div>
    <button class="add-btn" id="open-add-btn" title="Add person">＋</button>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar" id="filter-bar">
    <button class="filter-pill active" data-cat="all">All</button>
  </div>

  <!-- Cards -->
  <div class="cards-grid" id="cards-container">
    <div class="spinner"></div>
  </div>
</div>

<!-- ═══ ADD / EDIT MODAL ═══ -->
<div class="modal-backdrop" id="form-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="form-modal-title">Add Person</span>
      <button class="modal-close" id="form-modal-close">✕</button>
    </div>
    <div class="form-body">
      <input type="hidden" id="edit-id">

      <!-- Photo upload -->
      <div class="form-group">
        <label class="form-label">Photo</label>
        <div class="photo-upload-area" id="photo-upload-area">
          <input type="file" id="photo-file-input" accept="image/*" capture="environment">
          <div id="photo-preview-container">
            <span class="upload-icon">📷</span>
            <div class="upload-label">Tap to add photo</div>
            <div class="upload-sub">Their face is the key</div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input class="form-input" type="text" id="f-name" placeholder="e.g. Mohammed Al-Rashid" autocomplete="off" enterkeyhint="next">
      </div>
      <div class="form-group">
        <label class="form-label">What you call them</label>
        <input class="form-input" type="text" id="f-nick" placeholder="e.g. Mo, Big Mo, the tall one" autocomplete="off" enterkeyhint="next">
      </div>
      <div class="form-group">
        <label class="form-label">Category *</label>
        <select class="form-input" id="f-category">
          <option value="">— choose —</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Memory Hook</label>
        <textarea class="form-input" id="f-hook" placeholder="e.g. Yusuf's youngest brother, loves cricket, drives a red car, has the big laugh" enterkeyhint="done"></textarea>
      </div>

      <button class="form-submit" id="form-submit-btn">Save Person</button>
    </div>
  </div>
</div>

<!-- ═══ DETAIL MODAL ═══ -->
<div class="modal-backdrop" id="detail-modal">
  <div class="modal-sheet" id="detail-content">
    <div class="modal-handle"></div>
    <div class="modal-header" style="justify-content:flex-end; padding-bottom:0;">
      <button class="modal-close" id="detail-modal-close">✕</button>
    </div>
    <!-- filled dynamically -->
  </div>
</div>

<!-- ═══ TOAST ═══ -->
<div class="toast" id="toast"></div>

<script type="module" src="script.js"></script>
</body>
</html>
